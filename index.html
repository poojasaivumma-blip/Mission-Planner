<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mission Tracker</title>

  <!-- Orbitron Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">

    <!-- Title -->
    <div class="title-box">
      <h1>MISSION TRACKER</h1>
    </div>

    <!-- Progress Section -->
    <div class="progress-section">
      <div class="stats">
        <span id="activeCount">Active Missions: 0</span>
      </div>
      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>
    </div>

    <!-- Input Section -->
    <div class="input-section">
      <input type="text" id="missionInput" placeholder="Enter Mission..."/>

      <input type="date" id="missionDate"/>

      <select id="priority">
        <option value="low">Low Priority</option>
        <option value="medium">Medium Priority</option>
        <option value="high">High Priority</option>
      </select>

      <button id="addBtn">ACCEPT MISSION</button>
    </div>

    <!-- Mission List -->
    <div id="missionList"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
